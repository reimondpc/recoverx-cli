name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev,test,static]"

      - name: Validate version tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_VERSION=$(python -c "import recoverx; print(recoverx.__version__)")
          echo "Tag: $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: Tag $TAG does not match package version v$PKG_VERSION"
            exit 1
          fi
          echo "Version validation passed"

      - name: Run full test suite
        run: python -m pytest -q --cov=src

      - name: Build package
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m pip install dist/*.whl
          python -c "import recoverx; print(f'recoverx {recoverx.__version__} installed successfully')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
